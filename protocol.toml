[protocol]
name = "shroudb-stash"
version = "0.1.0"
description = "Encrypted blob storage with S3 backend and envelope encryption"

[protocol.wire_format]
type = "resp3"
request_format = "array_of_bulk_strings"
success_envelope = "json_bulk_string"
error_envelope = "simple_error"

# ── Commands ──────────────────────────────────────────────────────────

[commands.auth]
description = "Authenticate this connection with a token"
syntax = "AUTH <token>"
acl = "none"
note = "Handled at the connection layer before dispatch."

[commands.auth.parameters.token]
type = "string"
required = true
description = "Authentication token"

[commands.store]
description = "Store an encrypted blob"
syntax = "STORE <id> <data_b64> [KEYRING <name>] [CONTENT_TYPE <mime>] [CLIENT_ENCRYPTED <wrapped_dek>]"
acl = "namespace:stash.<id>/WRITE"

[commands.store.parameters.id]
type = "string"
required = true
description = "Unique blob identifier"

[commands.store.parameters.data_b64]
type = "string"
required = true
description = "Base64-encoded blob data"

[commands.store.parameters.keyring]
type = "string"
required = false
description = "Cipher keyring name (default: stash-blobs)"

[commands.store.parameters.content_type]
type = "string"
required = false
description = "MIME content type"

[commands.store.parameters.client_encrypted]
type = "string"
required = false
description = "Passthrough mode: value is the base64-encoded wrapped DEK from client-side encryption. When validation is enabled (default), the wrapped DEK must be valid base64 decoding to at least 32 bytes, and the blob data must be at least 28 bytes (AES-256-GCM nonce + auth tag)."

[commands.store.response]
status = "string"
id = "string"
s3_key = "string"
keyring = "string"
key_version = "integer"
plaintext_size = "integer"
encrypted_size = "integer"
client_encrypted = "boolean"
content_hash = "string|null"
deduplicated = "boolean"

[commands.retrieve]
description = "Retrieve and decrypt a blob"
syntax = "RETRIEVE <id>"
acl = "namespace:stash.<id>/READ"
response_format = "resp3_array"
response_note = "Returns Array[metadata_json, blob_bytes]"

[commands.retrieve.parameters.id]
type = "string"
required = true
description = "Blob identifier"

[commands.inspect]
description = "Read blob metadata without downloading or decrypting"
syntax = "INSPECT <id>"
acl = "namespace:stash.<id>/READ"

[commands.inspect.parameters.id]
type = "string"
required = true
description = "Blob identifier"

[commands.inspect.response]
status = "string"
id = "string"
blob_status = "string"
content_type = "string"
plaintext_size = "integer"
encrypted_size = "integer"
keyring = "string"
key_version = "integer"
client_encrypted = "boolean"
viewer_count = "integer"
created_at = "integer"
updated_at = "integer"

[commands.rewrap]
description = "Re-wrap a blob's DEK under the current Cipher key version. The blob ciphertext is not re-encrypted — only the key wrapping changes."
syntax = "REWRAP <id>"
acl = "namespace:stash.<id>/WRITE"

[commands.rewrap.parameters.id]
type = "string"
required = true
description = "Blob identifier"

[commands.rewrap.response]
status = "string"
id = "string"
key_version = "integer"
updated_at = "integer"

[commands.revoke]
description = "Revoke a blob (hard crypto-shred by default, SOFT for soft revoke)"
syntax = "REVOKE <id> [SOFT]"
acl = "namespace:stash.<id>/WRITE"

[commands.revoke.parameters.id]
type = "string"
required = true
description = "Blob identifier"

[commands.revoke.parameters.soft]
type = "flag"
required = false
description = "Soft revoke (preserve data, block access)"

[commands.revoke.response]
status = "string"
id = "string"
revoke_mode = "string"

[commands.fingerprint]
description = "Create a viewer-specific encrypted copy of a blob for leak tracing"
syntax = "FINGERPRINT <id> <viewer_id> [PARAMS <json>]"
acl = "namespace:stash.<id>/WRITE"

[commands.fingerprint.parameters.id]
type = "string"
required = true
description = "Blob identifier"

[commands.fingerprint.parameters.viewer_id]
type = "string"
required = true
description = "Viewer identifier for the fingerprinted copy"

[commands.fingerprint.parameters.params]
type = "string"
required = false
description = "JSON string of fingerprint parameters passed to the processor"

[commands.fingerprint.response]
status = "string"
viewer_id = "string"
s3_key = "string"
created_at = "integer"

[commands.trace]
description = "Return the viewer map (who has copies) for a blob"
syntax = "TRACE <id>"
acl = "namespace:stash.<id>/READ"

[commands.trace.parameters.id]
type = "string"
required = true
description = "Blob identifier"

[commands.trace.response]
status = "string"
id = "string"
blob_status = "string"
viewer_count = "integer"
viewers = "array"

[commands.list]
description = "List blobs for the current tenant"
syntax = "LIST [LIMIT <n>]"
acl = "namespace:stash.*/READ"

[commands.list.parameters.limit]
type = "integer"
required = false
description = "Maximum number of blobs to return (default: 100)"

[commands.list.response]
status = "string"
tenant = "string"
count = "integer"
blobs = "array"

[commands.health]
description = "Health check"
syntax = "HEALTH"
acl = "none"

[commands.ping]
description = "Ping-pong"
syntax = "PING"
acl = "none"

[commands.command]
description = "List supported commands"
syntax = "COMMAND"
acl = "none"

[commands.hello]
description = "Engine identity handshake — returns engine name, version, wire protocol, supported commands, and capability tags. Pre-auth; clients issue this on connect to verify they are talking to the expected engine and version."
syntax = "HELLO"
acl = "none"

[commands.hello.response]
engine = "string"
version = "string"
protocol = "string"
commands = "array"
capabilities = "array"

# ── Error codes ───────────────────────────────────────────────────────

[error_codes]

[error_codes.NOTFOUND]
description = "Blob not found"
http_equiv = 404

[error_codes.EXISTS]
description = "Blob already exists with this ID"
http_equiv = 409

[error_codes.REVOKED]
description = "Blob has been soft-revoked"
http_equiv = 403

[error_codes.SHREDDED]
description = "Blob has been crypto-shredded (unrecoverable)"
http_equiv = 410

[error_codes.CIPHER_UNAVAILABLE]
description = "Cipher engine not available for envelope encryption"
http_equiv = 503

[error_codes.DUPLICATE_VIEWER]
description = "Viewer already has a fingerprinted copy of this blob"
http_equiv = 409

[error_codes.CLIENT_ENCRYPTED]
description = "Cannot fingerprint a client-encrypted blob (client manages encryption)"
http_equiv = 400

[error_codes.DENIED]
description = "ABAC policy denied the operation"
http_equiv = 403

[error_codes.OBJECT_STORE]
description = "S3 object store operation failed"
http_equiv = 502

[error_codes.CRYPTO]
description = "Encryption or decryption failed"
http_equiv = 500

[error_codes.INVALID_ARGUMENT]
description = "Invalid argument"
http_equiv = 400

[error_codes.STORE]
description = "ShrouDB Store (metadata) operation failed"
http_equiv = 500

[error_codes.INTERNAL]
description = "Internal engine error"
http_equiv = 500
